<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krvatox — System Benchmarking</title>
    <style>
        /* Цветовая палитра: благородный бело-серый глянец */
        :root {
            --bg-1: #ffffff;
            --bg-2: #f5f5f7;
            --bg-3: #e5e5ea;
            --bg-4: #fafafa;
            --text: #000000;
            --border: rgba(0, 0, 0, 0.08);
            --border-strong: #000000;
            --muted: #6e6e73;
            --block-bg: rgba(0, 0, 0, 0.02);
        }

        /* Глубокие графитово-платиновые переливы в темной теме */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #09090b;
                --bg-2: #121216;
                --bg-3: #1a1a22;
                --bg-4: #141419;
                --text: #ffffff;
                --border: rgba(255, 255, 255, 0.08);
                --border-strong: #ffffff;
                --muted: #86868b;
                --block-bg: rgba(255, 255, 255, 0.03);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Полноэкранный контейнер с живой анимацией градиента */
        body {
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-4), var(--bg-1));
            background-size: 400% 400%;
            animation: fullscreenGradient 16s ease infinite;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
            transition: color 0.3s;
            overflow-x: hidden;
        }

        @keyframes fullscreenGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Полноэкранный двухколоночный grid */
        .main-content {
            grid-shrink: 0;
            width: 100%;
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        /* Левая колонка — Статус */
        .status-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--muted);
            font-weight: 400;
            margin-bottom: 40px;
        }

        .not-supported-box {
            border-left: 3px solid var(--border-strong);
            background-color: var(--block-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px;
            margin-bottom: 32px;
        }

        .box-title {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .box-desc {
            font-size: 1.05rem;
            line-height: 1.5;
            color: var(--text);
        }

        .btn-disabled {
            width: 100%;
            max-width: 400px;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 20px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: not-allowed;
            text-align: center;
            margin-bottom: 20px;
        }

        .pc-hint {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.4;
        }

        /* Правая колонка — Описание возможностей */
        .features-side {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border);
            padding: 40px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .feature-item {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            color: var(--text);
        }

        .feature-item:last-child {
            margin-bottom: 0;
        }

        .feature-item::before {
            content: "→";
            font-weight: bold;
            margin-right: 16px;
            color: var(--muted);
            flex-shrink: 0;
        }

        /* Футер */
        footer {
            width: 100%;
            max-width: 1200px;
            margin: 40px auto 0 auto;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .footer-links {
            display: flex;
            gap: 30px;
        }

        .footer-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .copyright {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        /* Адаптивность */
        @media (max-width: 992px) {
            body { padding: 30px 24px; }
            .main-content {
                grid-template-columns: 1fr;
                gap: 50px;
                margin: 20px auto;
            }
            h1 { font-size: 3rem; }
            .btn-disabled { max-width: 100%; }
            footer {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                margin-top: 60px;
            }
        }
    </style>
</head>
<body>

        function applyLanguage(lang) {
            if (!translations[lang]) return;
            const data = translations[lang];
            
            document.getElementById('mainTitle').textContent = data.mainTitle;
            document.getElementById('tagline').textContent = data.tagline;
            document.getElementById('alertTitle').textContent = data.alertTitle;
            document.getElementById('alertDesc').textContent = data.alertDesc;
            document.getElementById('aboutTitle').textContent = data.aboutTitle;
            document.getElementById('btnText').textContent = data.btnText;
            document.getElementById('pcHint').textContent = data.pcHint;
            document.getElementById('licenseLink').textContent = data.licenseLink;

            const listContainer = document.getElementById('featuresList');
            listContainer.innerHTML = '';
            data.features.forEach(text => {
                const item = document.createElement('div');
                item.className = 'feature-item';
                item.textContent = text;
                listContainer.appendChild(item);
            });
        }

        // Автоопределение локализации браузера
        window.addEventListener('DOMContentLoaded', () => {
            const userLanguages = navigator.languages || [navigator.language || navigator.userLanguage];
            let matchedLang = 'en';

            for (let lang of userLanguages) {
                const shortLang = lang.substring(0, 2).toLowerCase();
                if (translations[shortLang]) {
                    matchedLang = shortLang;
                    break;
                }
            }
            
            applyLanguage(matchedLang);
        });
