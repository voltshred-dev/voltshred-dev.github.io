<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krvatox — System Benchmarking</title>
    <style>
        /* Цветовая схема с упором на бело-серый переливающийся спектр */
        :root {
            --bg-1: #ffffff;
            --bg-2: #f4f4f6;
            --bg-3: #e2e2e7;
            --text: #000000;
            --border: #e2e2e7;
            --border-strong: #000000;
            --muted: #666666;
            --block-bg: rgba(0, 0, 0, 0.02);
        }

        /* Темная тема адаптирована под глубокие графитово-серые переливы */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #0a0a0c;
                --bg-2: #121215;
                --bg-3: #1c1c21;
                --text: #ffffff;
                --border: #2c2c35;
                --border-strong: #ffffff;
                --muted: #8e8e93;
                --block-bg: rgba(255, 255, 255, 0.03);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            /* Мягкая и плавная анимация бело-серого градиента */
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
            background-size: 400% 400%;
            animation: gradientShift 14s ease infinite;
            
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 24px;
            transition: color 0.3s;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .wrapper {
            max-width: 480px;
            width: 100%;
            margin-top: 20px;
        }

        header {
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        /* Контентная часть */
        .hero {
            padding: 40px 0 30px 0;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1rem;
            color: var(--muted);
            font-weight: 400;
        }

        /* Предупреждение о мобильных устройствах */
        .not-supported-box {
            border: 1px solid var(--border-strong);
            background-color: var(--block-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 22px;
            margin-bottom: 32px;
        }

        .box-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .box-desc {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text);
        }

        /* Список возможностей */
        .features {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .feature-item {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 14px;
            display: flex;
            align-items: flex-start;
        }

        .feature-item::before {
            content: "■";
            font-size: 0.55rem;
            margin-right: 12px;
            margin-top: 6px;
            color: var(--text);
            flex-shrink: 0;
        }

        /* Кнопка */
        .btn-disabled {
            width: 100%;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: not-allowed;
            text-align: center;
            margin-bottom: 24px;
        }

        .pc-hint {
            font-size: 0.95rem;
            color: var(--text);
            font-weight: 600;
            text-align: center;
            line-height: 1.5;
            padding: 16px;
            border: 1px dashed var(--border-strong);
            background-color: var(--block-bg);
        }

        /* Подвал */
        footer {
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--muted);
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .footer-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .footer-links a:hover {
            opacity: 0.7;
            text-decoration: underline;
        }

        .copyright {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

        function applyLanguage(lang) {
            if (!translations[lang]) return;
            const data = translations[lang];
            
            document.getElementById('mainTitle').textContent = data.mainTitle;
            document.getElementById('tagline').textContent = data.tagline;
            document.getElementById('alertTitle').textContent = data.alertTitle;
            document.getElementById('alertDesc').textContent = data.alertDesc;
            document.getElementById('aboutTitle').textContent = data.aboutTitle;
            document.getElementById('btnText').textContent = data.btnText;
            document.getElementById('pcHint').textContent = data.pcHint;
            document.getElementById('licenseLink').textContent = data.licenseLink;

            const listContainer = document.getElementById('featuresList');
            listContainer.innerHTML = '';
            data.features.forEach(text => {
                const item = document.createElement('div');
                item.className = 'feature-item';
                item.textContent = text;
                listContainer.appendChild(item);
            });
        }

        // Автоопределение локализации браузера
        window.addEventListener('DOMContentLoaded', () => {
            const userLanguages = navigator.languages || [navigator.language || navigator.userLanguage];
            let matchedLang = 'en';

            for (let lang of userLanguages) {
                const shortLang = lang.substring(0, 2).toLowerCase();
                if (translations[shortLang]) {
                    matchedLang = shortLang;
                    break;
                }
            }
            
            applyLanguage(matchedLang);
        });
